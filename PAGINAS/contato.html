<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../ESTILO/contato.css">
    <link rel="stylesheet" href="../ESTILO/style.css">
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/pt/f/f9/Furia_Esports_logo.png" type="image/png">
</head>

<body>

    <nav>
        <figure>
            <img src="https://upload.wikimedia.org/wikipedia/pt/f/f9/Furia_Esports_logo.png" alt="Logotipo da FURIA Esports">
            <figcaption>FURIA</figcaption>
        </figure>
        <ul>
            <li><a href="../index.html#sobre">Sobre</a></li>
            <li><a href="../index.html#historia">História</a></li>
            <li><a href="../index.html#modalidades">Modalidades</a></li>
            <li><a href="../index.html#conquistas">Conquistas</a></li>
            <li><a href="../index.html#jogadores">Jogadores</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Entre em <span>Contato</span></h2>
            <hr class="linha-secao">

            <form action="#" method="post" onsubmit="mostrarMensagem(event)">
                <table>
                    <tr>
                        <td><label for="ipNome">Nome:</label></td>
                        <td><input type="text" id="ipNome" name="nome" required></td>
                    </tr>
                    <tr>
                        <td><label for="ipEmail">E-mail:</label></td>
                        <td><input type="email" id="ipEmail" name="email" required></td>
                    </tr>
                    <tr>
                        <td><label for="ipTel">Telefone:</label></td>
                        <td><input type="tel" id="ipTel" name="telefone" required></td>
                    </tr>
                    <tr>
                        <td><label for="endereco">Endereço:</label></td>
                        <td><input type="text" id="endereco" name="endereco"></td>
                    </tr>
                    <tr>
                        <td><label for="dataNasc">Data de Nascimento:</label></td>
                        <td><input type="date" id="dataNasc" name="data_nascimento" required></td>
                    </tr>
                    <tr>
                        <td><label for="slMotivo">Qual o motivo de contato:</label></td>
                        <td>
                            <select id="slMotivo" name="Motivo" required>
                                <option value="">Selecione...</option>
                                <option value="Apresentar Portifólio">Apresentar Portifólio</option>
                                <option value="Suporte">Suporte</option>
                                <option value="Trabalhar Conosco">Trabalhar Conosco</option>
                                <option value="Ser um Furioso">Ser um Furioso</option>
                                <option value="Outro motivo">Outro Motivo</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="aMensagem">Mensagem:</label></td>
                        <td><textarea id="aMensagem" name="mensagem" rows="5" required></textarea></td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <input type="checkbox" id="novidades" name="novidades">
                            <label for="novidades">Deseja receber novidades?</label>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <button type="submit">Enviar</button>
                        </td>
                    </tr>
                </table>
            </form>

            <section id="resultado">
                <h3 id="resposta"></h3>
                <p id="nomeExibido"></p>
                <p id="emailExibido"></p>
                <p id="telExibido"></p>
                <p id="dataExibida"></p>
                <p id="motivoExibido"></p>
                <p id="mensagemExibida"></p>
            </section>
        </section>
    </main>

    <footer>
        <figure>
            <img src="https://upload.wikimedia.org/wikipedia/pt/f/f9/Furia_Esports_logo.png" alt="Logotipo FURIA Esports">
            <figcaption>Organização brasileira de esports fundada em 2017. Do Brasil para o mundo — com garra, raça e FURIA.</figcaption>
        </figure>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>

                <li><a href="../index.html#conquistas">Conquistas</a></li>
                <li><a href="contato.html">Contato</a></li>
                <li><a href="https://furia.gg" target="_blank" rel="noopener">Site Oficial</a></li>
            </ul>
        </nav>
        <address>
            <p><strong>Fundação</strong><br>2017 — Uberlândia, MG</p>
            <p><strong>Sede atual</strong><br>Miami, EUA &amp; Brasil</p>
        </address>
        <small>&copy; 2026 FURIA Esports. Site de portfólio informativo.</small>
    </footer>

    <script src="../SCRIPT/contato.js"></script>

</body>
</html>
